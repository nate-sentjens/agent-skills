name: Secrets Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  trufflehog:
    name: Scan for secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0        # Full history so trufflehog can diff commits

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          # --fail is passed automatically by the action; do not repeat it here.
          # On push: scans commits in this push.
          # On PR: scans commits between base and head.
          extra_args: --only-verified
